<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Face Recognition Camera</title>

<style>

body{
font-family: Arial;
background:#f4f6f9;
text-align:center;
margin:0;
}

header{
background:#1e1e1e;
color:white;
padding:15px;
font-size:22px;
}

.container{
margin-top:30px;
}

video{
border:4px solid #333;
border-radius:10px;
}

button{
padding:12px 25px;
margin:10px;
font-size:16px;
border:none;
border-radius:5px;
background:#007BFF;
color:white;
cursor:pointer;
}

button:hover{
background:#0056b3;
}

#status{
margin-top:10px;
font-size:18px;
}

#result{
margin-top:20px;
font-size:20px;
font-weight:bold;
}

</style>

</head>

<body>

<header>
Face Recognition System
</header>

<div class="container">

<h2>Camera Recognition</h2>

<video id="video" width="420" height="320" autoplay></video>

<br>

<button onclick="startRecognition()">Start Recognition</button>
<button onclick="stopRecognition()">Stop Recognition</button>

<canvas id="canvas" width="420" height="320" style="display:none;"></canvas>

<div id="status">Starting camera...</div>
<div id="result">Waiting for recognition...</div>

</div>

<script>

const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const statusText = document.getElementById("status");
const resultText = document.getElementById("result");

let recognitionInterval;
let processing = false;

const API_KEY = "ca9ec933-b334-4424-a50e-14e54698d348";
const API_URL = "http://localhost:8000/api/v1/recognition/recognize";

// Access camera with lower resolution (faster processing)
navigator.mediaDevices.getUserMedia({

video:{
width:640,
height:480
}

})

.then(function(stream){

video.srcObject = stream;
statusText.innerText = "Camera ready";

})

.catch(function(error){

statusText.innerText = "Camera access denied";
console.error(error);

});

function startRecognition(){

statusText.innerText = "Recognition started";

recognitionInterval = setInterval(captureFrame,5000);

}

function stopRecognition(){

clearInterval(recognitionInterval);

statusText.innerText = "Recognition stopped";

}

function captureFrame(){

if(processing) return;

processing = true;

const context = canvas.getContext("2d");

context.drawImage(video,0,0,canvas.width,canvas.height);

canvas.toBlob(function(blob){

sendToCompreFace(blob);

},"image/jpeg",0.7);

}

async function sendToCompreFace(imageBlob){

const formData = new FormData();

formData.append("file",imageBlob,"face.jpg");

try{

statusText.innerText="Processing face...";

const response = await fetch(API_URL,{

method:"POST",

headers:{
"x-api-key":API_KEY
},

body:formData

});

const data = await response.json();

console.log(data);

if(data.result.length>0 && data.result[0].subjects.length>0){

let person = data.result[0].subjects[0].subject;
let similarity = data.result[0].subjects[0].similarity;

resultText.innerHTML =
"Recognized: "+person+
"<br>Similarity: "+(similarity*100).toFixed(2)+"%";

}

else{

resultText.innerHTML = "Face detected but not recognized";

}

statusText.innerText="Camera ready";

}

catch(error){

console.error(error);

resultText.innerHTML="Recognition failed";

statusText.innerText="Error contacting server";

}

processing = false;

}

</script>

</body>

</html>
