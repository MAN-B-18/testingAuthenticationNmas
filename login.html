<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NMAS Staff Login</title>
<style>
body { font-family: Arial; text-align:center; background:#f4f6f9; }
header { background:#1e1e1e; color:white; padding:15px; font-size:22px; }
video { border:4px solid #333; border-radius:10px; margin-top:20px; }
canvas { display:none; }
button { padding:12px 25px; margin:10px; font-size:16px; border:none; border-radius:5px; background:#007BFF; color:white; cursor:pointer; }
button:hover { background:#0056b3; }
#status { margin-top:10px; font-size:18px; }
#result { margin-top:20px; font-size:20px; font-weight:bold; }
</style>
</head>
<body>

<header>NMAS Staff Login</header>

<video id="video" width="640" height="480" autoplay></video>
<br>
<button onclick="capture()">Login with Face</button>

<canvas id="canvas" width="640" height="480"></canvas>

<div id="status">Starting camera...</div>
<div id="result">Waiting for recognition...</div>

<script>
const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const statusText = document.getElementById("status");
const resultText = document.getElementById("result");

// Replace with your CompreFace Recognition service API key
const API_KEY = "YOUR_RECOGNITION_API_KEY";
const RECOGNIZE_URL = "http://localhost:8000/api/v1/recognition/recognize";

// Start camera
navigator.mediaDevices.getUserMedia({ video:{ width:640, height:480 } })
.then(stream => {
  video.srcObject = stream;
  statusText.innerText = "Camera ready";
})
.catch(err => {
  statusText.innerText = "Camera access denied";
  console.error(err);
});

function capture(){
  const ctx = canvas.getContext("2d");
  ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

  canvas.toBlob(blob => {
    recognizeFace(blob);
  }, "image/jpeg", 0.95);
}

async function recognizeFace(blob){
  const formData = new FormData();
  formData.append("file", blob, "face.jpg");

  try{
    statusText.innerText = "Recognizing face...";
    const response = await fetch(RECOGNIZE_URL, {
      method: "POST",
      headers: { "x-api-key": API_KEY },
      body: formData
    });
    const data = await response.json();
    console.log(data);

    if(data.result && data.result.length > 0 && data.result[0].subjects.length > 0){
      const subject = data.result[0].subjects[0].subject;
      const similarity = data.result[0].subjects[0].similarity;
      resultText.innerHTML = `Welcome, ${subject}<br>Similarity: ${(similarity*100).toFixed(2)}%`;
      setTimeout(() => { window.location.href = "dashboard.html"; }, 2000);
    } else {
      resultText.innerText = "Face not recognized. Please try again.";
    }
  } catch(error){
    console.error(error);
    resultText.innerText = "Recognition failed.";
  }
}
</script>

</body>
</html>
