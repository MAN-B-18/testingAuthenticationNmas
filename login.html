<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NMAS Staff Login</title>
<style>
body {
  margin:0;
  font-family:Arial, sans-serif;
  background:linear-gradient(135deg,#ff7a00,#ffffff);
}
header {
  background:#ff7a00;
  color:white;
  padding:15px;
  text-align:center;
  font-size:22px;
}
.container {
  background:white;
  width:500px;
  margin:40px auto;
  padding:30px;
  border-radius:10px;
  box-shadow:0px 5px 15px rgba(0,0,0,0.2);
  text-align:center;
}
button {
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:6px;
  font-size:16px;
  background:#ff7a00;
  color:white;
  cursor:pointer;
}
button:hover {
  background:#e65c00;
}
video {
  width:100%;
  margin-top:10px;
  border-radius:10px;
  border:3px solid #ff7a00;
  display:none;
}
#status {
  margin-top:10px;
  font-weight:bold;
}
</style>
</head>
<body>

<header>NMAS Staff Login</header>

<div class="container">
  <h3>Face Scanner</h3>
  <button onclick="startCamera()">Open Camera</button>
  <video id="video" autoplay></video>
  <br>
  <button onclick="capture()">Login with Face</button>
  <p id="status">Camera inactive</p>
</div>

<script>
const video = document.getElementById("video");
const statusText = document.getElementById("status");
const canvas = document.createElement("canvas");

let stream = null;

// Use the API key from your Recognition service
const API_KEY = "ccb5846a-2b2b-46c6-adac-1802ac50488b";
const RECOGNIZE_URL = "http://localhost:8000/api/v1/recognition/recognize";

function startCamera(){
  navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480 } })
    .then(s => {
      stream = s;
      video.srcObject = stream;
      video.style.display = "block";
      statusText.innerText = "Camera active";
    })
    .catch(err => {
      console.error(err);
      statusText.innerText = "Camera permission denied";
    });
}

function capture(){
  if(!stream){
    statusText.innerText = "Start camera first!";
    return;
  }

  const ctx = canvas.getContext("2d");
  canvas.width = 640;
  canvas.height = 480;
  ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

  canvas.toBlob(async blob => {
    statusText.innerText = "Processing face...";
    await recognizeFace(blob);
  }, "image/jpeg", 0.95);
}

async function recognizeFace(blob){
  const formData = new FormData();
  formData.append("file", blob, "face.jpg");

  try{
    const response = await fetch(RECOGNIZE_URL, {
      method: "POST",
      headers: { "x-api-key": API_KEY },
      body: formData
    });

    const data = await response.json();
    console.log("Recognition result:", data);

    if(data.result && data.result.length > 0 && data.result[0].subjects.length > 0){
      const subject = data.result[0].subjects[0].subject;
      const similarity = data.result[0].subjects[0].similarity;
      statusText.innerText = `Welcome, ${subject} (match ${(similarity*100).toFixed(1)}%)`;
      
      // Optional: validate subject against your backend staff DB here
      // Example: await fetch('/validate-login', { method:'POST', body: JSON.stringify({ subject }) })

      setTimeout(() => { window.location.href = "dashboard.html"; }, 2000);
    } else {
      statusText.innerText = "Face not recognized. Please try again.";
    }

  } catch(err){
    console.error(err);
    statusText.innerText = "Recognition failed. Check server connection.";
  }
}
</script>

</body>
</html>
