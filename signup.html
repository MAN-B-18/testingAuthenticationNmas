<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NMAS Staff Signup</title>
<style>
body { font-family: Arial; text-align:center; background:#f4f6f9; }
header { background:#1e1e1e; color:white; padding:15px; font-size:22px; }
video { border:4px solid #333; border-radius:10px; margin-top:20px; }
canvas { display:none; }
button { padding:12px 25px; margin:10px; font-size:16px; border:none; border-radius:5px; background:#28a745; color:white; cursor:pointer; }
button:hover { background:#1e7e34; }
#status { margin-top:10px; font-size:18px; }
</style>
</head>
<body>

<header>NMAS Staff Signup</header>

<video id="video" width="640" height="480" autoplay></video>
<br>
<button onclick="capture()">Register Face</button>

<canvas id="canvas" width="640" height="480"></canvas>

<div id="status">Starting camera...</div>

<script>
const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const statusText = document.getElementById("status");

// Replace with your CompreFace Recognition service API key
const API_KEY = "YOUR_RECOGNITION_API_KEY";
const REGISTER_URL = "http://localhost:8000/api/v1/recognition/faces";

// Start camera
navigator.mediaDevices.getUserMedia({ video:{ width:640, height:480 } })
.then(stream => {
  video.srcObject = stream;
  statusText.innerText = "Camera ready";
})
.catch(err => {
  statusText.innerText = "Camera access denied";
  console.error(err);
});

function capture(){
  const ctx = canvas.getContext("2d");
  ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

  canvas.toBlob(blob => {
    let name = prompt("Enter your full name to register:");
    if(name) registerFace(blob, name);
  }, "image/jpeg", 0.95);
}

async function registerFace(blob, name){
  const formData = new FormData();
  formData.append("file", blob, "face.jpg");
  formData.append("subject", name);

  try{
    statusText.innerText = "Registering face...";
    const response = await fetch(REGISTER_URL, {
      method: "POST",
      headers: { "x-api-key": API_KEY },
      body: formData
    });
    const data = await response.json();
    console.log(data);

    if(data.result && data.result.length > 0){
      statusText.innerText = `Registered successfully: ${name}`;
      setTimeout(() => { window.location.href = "login.html"; }, 2000);
    } else {
      statusText.innerText = "No face detected. Please try again.";
    }
  } catch(error){
    console.error(error);
    statusText.innerText = "Registration failed.";
  }
}
</script>

</body>
</html>
