<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NMAS Staff Registration</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#ff7a00,#ffffff);
}

header{
background:#ff7a00;
color:white;
padding:15px;
text-align:center;
font-size:22px;
}

.container{
background:white;
width:500px;
margin:40px auto;
padding:30px;
border-radius:10px;
box-shadow:0px 5px 15px rgba(0,0,0,0.2);
}

input{
width:100%;
padding:10px;
margin:8px 0;
border-radius:5px;
border:1px solid #ccc;
}

button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:6px;
font-size:16px;
background:#ff7a00;
color:white;
cursor:pointer;
}

button:hover{
background:#e65c00;
}

video{
width:100%;
margin-top:10px;
border-radius:10px;
border:3px solid #ff7a00;
}

img{
width:100%;
margin-top:10px;
border-radius:10px;
}

#status{
margin-top:10px;
font-weight:bold;
}

</style>
</head>

<body>

<header>NMAS Staff Registration</header>

<div class="container">

<input id="fullname" type="text" placeholder="Full Name">
<input id="email" type="email" placeholder="Email">
<input id="phone" type="text" placeholder="Phone Number">
<input id="staff" type="text" placeholder="Staff Number">
<input id="province" type="text" placeholder="Province">
<input id="district" type="text" placeholder="District">
<input id="facility" type="text" placeholder="Health Facility Name">

<h3>Capture Face Image</h3>

<video id="video" autoplay></video>

<button onclick="capture()">Capture Image</button>

<img id="preview">

<button onclick="registerFace()">Register Staff</button>

<canvas id="canvas" style="display:none"></canvas>

<p id="status"></p>

</div>

<script>

const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const preview = document.getElementById("preview");
const statusText = document.getElementById("status");

let capturedBlob = null;

const API_KEY = "ccb5846a-2b2b-46c6-adac-1802ac50488b";
const REGISTER_URL = "http://localhost:8000/api/v1/recognition/faces";


// Start Camera
navigator.mediaDevices.getUserMedia({video:true})
.then(stream=>{
video.srcObject = stream;
})
.catch(err=>{
statusText.innerText = "Camera access denied";
console.error(err);
});


// Capture Image
function capture(){

const ctx = canvas.getContext("2d");

canvas.width = 640;
canvas.height = 480;

ctx.drawImage(video,0,0,canvas.width,canvas.height);

canvas.toBlob(blob=>{

capturedBlob = blob;

preview.src = URL.createObjectURL(blob);

console.log("Captured image blob:", blob);

statusText.innerText = "Image captured successfully";

},"image/jpeg",0.9);

}


// Register Face
async function registerFace(){

let name = document.getElementById("fullname").value;
let email = document.getElementById("email").value;
let phone = document.getElementById("phone").value;

if(name === "" || email === "" || phone === ""){
statusText.innerText="Please fill all required fields";
return;
}

if(!capturedBlob){
statusText.innerText="Capture image first";
return;
}

const formData = new FormData();

formData.append("file", capturedBlob, "face.jpg");
formData.append("subject", name);

try{

statusText.innerText="Registering staff...";

const response = await fetch(REGISTER_URL,{
method:"POST",
headers:{
"x-api-key":API_KEY
},
body:formData
});

const data = await response.json();

console.log("CompreFace response:", data);


if(data){

statusText.innerText = "Staff registered successfully! Redirecting to login...";

document.querySelectorAll("input").forEach(input => input.value="");
preview.src="";

setTimeout(()=>{

window.location.href="login.html";

},2000);

}else{

statusText.innerText = "Face registration failed";

}

}catch(error){

console.error(error);

statusText.innerText="Server error connecting to CompreFace";

}

}

</script>

</body>
</html>
