<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NMAS Staff Registration</title>
<style>
body {
  margin:0;
  font-family:Arial, sans-serif;
  background:linear-gradient(135deg,#ff7a00,#ffffff);
}
header {
  background:#ff7a00;
  color:white;
  padding:15px;
  text-align:center;
  font-size:22px;
}
.container {
  background:white;
  width:500px;
  margin:40px auto;
  padding:30px;
  border-radius:10px;
  box-shadow:0px 5px 15px rgba(0,0,0,0.2);
}
input {
  width:100%;
  padding:10px;
  margin:8px 0;
  border-radius:5px;
  border:1px solid #ccc;
}
button {
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:6px;
  font-size:16px;
  background:#ff7a00;
  color:white;
  cursor:pointer;
}
button:hover {
  background:#e65c00;
}
video {
  width:100%;
  margin-top:10px;
  border-radius:10px;
  border:3px solid #ff7a00;
  display:none;
}
#previews {
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  margin-top:10px;
}
#previews img {
  width:100px;
  margin:5px;
  border-radius:5px;
  border:2px solid #ff7a00;
}
#status {
  margin-top:10px;
  font-weight:bold;
}
</style>
</head>
<body>

<header>NMAS Staff Registration</header>

<div class="container">
  <input id="fullname" type="text" placeholder="Full Name">
  <input id="email" type="email" placeholder="Email">
  <input id="phone" type="text" placeholder="Phone Number">
  <input id="staff" type="text" placeholder="Staff Number">
  <input id="province" type="text" placeholder="Province">
  <input id="district" type="text" placeholder="District">
  <input id="facility" type="text" placeholder="Health Facility Name">

  <h3>Face Scanner</h3>
  <button onclick="startCamera()">Open Camera</button>
  <video id="video" autoplay></video>
  <br>
  <button onclick="capture()">Capture Face</button>

  <div id="previews"></div>
  <p id="status">Camera inactive</p>
</div>

<script>
const video = document.getElementById("video");
const previews = document.getElementById("previews");
const statusText = document.getElementById("status");
const canvas = document.createElement("canvas");

let stream = null;

const API_KEY = "ccb5846a-2b2b-46c6-adac-1802ac50488b";
const REGISTER_URL = "http://localhost:8000/api/v1/recognition/faces";

function startCamera(){
  navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480 } })
    .then(s => {
      stream = s;
      video.srcObject = stream;
      video.style.display = "block";
      statusText.innerText = "Camera active";
    })
    .catch(err => {
      console.error(err);
      statusText.innerText = "Camera permission denied";
    });
}

function capture(){
  if(!stream){
    statusText.innerText = "Start camera first!";
    return;
  }

  const fullname = document.getElementById("fullname").value.trim();
  if(fullname === ""){
    statusText.innerText = "Enter Full Name first!";
    return;
  }

  const ctx = canvas.getContext("2d");
  canvas.width = 640;
  canvas.height = 480;
  ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

  canvas.toBlob(async blob => {
    const img = document.createElement("img");
    img.src = URL.createObjectURL(blob);
    previews.appendChild(img);

    statusText.innerText = "Captured face, registering...";

    await registerFace(blob, fullname);
  }, "image/jpeg", 0.8);
}

async function registerFace(blob, subject){
  const formData = new FormData();
  formData.append("file", blob, "face.jpg");
  formData.append("subject", subject);

  try{
    const response = await fetch(REGISTER_URL, {
      method: "POST",
      headers: { "x-api-key": API_KEY },
      body: formData
    });

    const data = await response.json();
    console.log("Registration result:", data);

    if(data.result){
      statusText.innerText = `Registered: ${subject}`;
      // Save staff details to your backend here
      // Example:
      // await fetch('/save-staff', { method:'POST', body: JSON.stringify({ fullname, email, phone, staff, province, district, facility }) })

      setTimeout(() => { window.location.href = "login.html"; }, 2000);
    } else {
      statusText.innerText = `Failed to register ${subject}`;
    }

  } catch(err){
    console.error(err);
    statusText.innerText = `Registration failed for ${subject}`;
  }
}
</script>

</body>
</html>
