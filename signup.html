<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NMAS Staff Registration</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#ff7a00,#ffffff);
}

header{
background:#ff7a00;
color:white;
padding:15px;
text-align:center;
font-size:22px;
}

.container{
background:white;
width:500px;
margin:40px auto;
padding:30px;
border-radius:10px;
box-shadow:0px 5px 15px rgba(0,0,0,0.2);
}

input{
width:100%;
padding:10px;
margin:8px 0;
border-radius:5px;
border:1px solid #ccc;
}

button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:6px;
font-size:16px;
background:#ff7a00;
color:white;
cursor:pointer;
}

button:hover{
background:#e65c00;
}

video{
width:100%;
margin-top:10px;
border-radius:10px;
border:3px solid #ff7a00;
}

</style>
</head>

<body>

<header>NMAS Staff Registration</header>

<div class="container">

<input type="text" placeholder="Full Name">
<input type="email" placeholder="Email">
<input type="text" placeholder="Phone Number">
<input type="text" placeholder="Staff Number">
<input type="text" placeholder="Province">
<input type="text" placeholder="District">
<input type="text" placeholder="Health Facility Name">

<h3>Capture Face Image</h3>

<video id="video" autoplay></video>

<button onclick="capture()">Capture Image</button>
<button onclick="registerFace()">Register Staff</button>

<canvas id="canvas" style="display:none"></canvas>

<p id="status"></p>

</div>

<script>

const video=document.getElementById("video");
const canvas=document.getElementById("canvas");
const status=document.getElementById("status");

let capturedBlob=null;

const API_KEY="ccb5846a-2b2b-46c6-adac-1802ac50488b";
const REGISTER_URL="http://localhost:8000/api/v1/recognition/faces";

navigator.mediaDevices.getUserMedia({video:true})
.then(stream=>{
video.srcObject=stream;
})
.catch(err=>{
status.innerText="Camera error";
});

function capture(){

const ctx=canvas.getContext("2d");

canvas.width=640;
canvas.height=480;

ctx.drawImage(video,0,0,640,480);

canvas.toBlob(blob=>{
capturedBlob=blob;
status.innerText="Image Captured";
},"image/jpeg",0.8);

}

async function registerFace(){

let name=document.querySelector("input").value;

if(!capturedBlob){
status.innerText="Capture image first";
return;
}

const formData=new FormData();
formData.append("file",capturedBlob,"face.jpg");
formData.append("subject",name);

const res=await fetch(REGISTER_URL,{
method:"POST",
headers:{"x-api-key":API_KEY},
body:formData
});

status.innerText="Staff Registered Successfully";

}

</script>

</body>
</html>
